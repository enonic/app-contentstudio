version: 2
updates:
  - package-ecosystem: "gradle"
    directories:
      - "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    assignees:
      - "rymsha"
  - package-ecosystem: "npm"
    directories:
      - "/modules/app"
      - "/modules/lib"
      - "/testing"
    ignore:
      - dependency-name: "@enonic/lib-admin-ui"
    groups:
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      enonic-types:
        patterns:
          - "@enonic-types/*"
      rspack:
        patterns:
          - "@rspack/*"
      swc:
        patterns:
          - "@swc/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    assignees:
      - "alansemenov"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    assignees:
      - "rymsha"
